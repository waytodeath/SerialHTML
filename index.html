<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>串口数据监视器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { 
            font-size: 2.5em; 
            margin-bottom: 10px; 
            text-align: center;
        }
        .config {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .config h3 { margin-top: 0; }
        .config input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            background: rgba(255,255,255,0.9);
            color: #333;
        }
        .config button {
            background: #44ff44;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .config button:hover {
            background: #88ff88;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
        }
        .status-dot.connected {
            background: #44ff44;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .info {
            font-size: 0.9em;
            color: #ccc;
            margin-bottom: 20px;
        }
        .data-box {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }
        .data-line {
            margin: 5px 0;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        .timestamp {
            color: #aaa;
            font-size: 0.85em;
            margin-right: 10px;
        }
        .no-data {
            text-align: center;
            color: #888;
            padding: 50px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .stat {
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.8em;
            color: #aaa;
        }
        .error {
            background: rgba(255,0,0,0.2);
            padding: 10px;
            border-radius: 5px;
            color: #ff6666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>串口数据监视器</h1>
        
        <div class="config">
            <h3>配置</h3>
            <label>GitHub Gist ID:</label>
            <input type="text" id="gistId" placeholder="输入你的 Gist ID (如 a1b2c3d4e5f6...)">
            <button onclick="loadData()">连接</button>
            <p style="font-size: 0.8em; color: #aaa; margin-top: 10px;">
                提示: 公开的 Gist 不需要 Token，直接填 ID 即可
            </p>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="recordCount">0</div>
                <div class="stat-label">数据条数</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="lastUpdate">--:--:--</div>
                <div class="stat-label">最后更新</div>
            </div>
        </div>
        
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">请输入 Gist ID 并点击连接</span>
        </div>
        
        <div class="info">
            数据每 5 秒自动刷新一次
        </div>
        
        <div class="data-box" id="dataBox">
            <div class="no-data">暂无数据，请先运行上传程序</div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        
        function loadData() {
            const gistId = document.getElementById('gistId').value.trim();
            
            if (!gistId) {
                alert('请输入 Gist ID');
                return;
            }
            
            localStorage.setItem('gist_id', gistId);
            
            fetchData(gistId);
            
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            autoRefreshInterval = setInterval(() => fetchData(gistId), 5000);
        }
        
        function fetchData(gistId) {
            document.getElementById('statusDot').classList.remove('connected');
            document.getElementById('statusText').textContent = '正在获取数据...';
            
            const timestamp = new Date().getTime();
            fetch(`https://api.github.com/gists/${gistId}?t=${timestamp}`, {
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Cache-Control': 'no-cache'
                }
            })
            .then(response => {
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Gist 不存在，请检查 Gist ID 是否正确');
                    }
                    throw new Error('获取数据失败');
                }
                return response.json();
            })
            .then(gist => {
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('statusText').textContent = '已连接';
                
                const files = gist.files;
                if (files && files['data.json']) {
                    try {
                        const data = JSON.parse(files['data.json'].content);
                        displayData(data.records || []);
                    } catch (e) {
                        throw new Error('数据格式错误');
                    }
                } else {
                    throw new Error('未找到 data.json 文件');
                }
            })
            .catch(error => {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = '错误: ' + error.message;
                document.getElementById('dataBox').innerHTML = 
                    `<div class="error">${error.message}</div>`;
            });
        }
        
        function displayData(records) {
            const dataBox = document.getElementById('dataBox');
            const recordCount = document.getElementById('recordCount');
            const lastUpdate = document.getElementById('lastUpdate');
            
            recordCount.textContent = records.length;
            
            if (records.length > 0) {
                lastUpdate.textContent = records[0].time ? records[0].time.split(' ')[1] : '--:--:--';
            }
            
            if (records.length === 0) {
                dataBox.innerHTML = '<div class="no-data">暂无数据</div>';
                return;
            }
            
            let html = '';
            const displayCount = Math.min(records.length, 20);
            
            for (let i = 0; i < displayCount; i++) {
                const record = records[i];
                html += `<div class="data-line">
                    <span class="timestamp">[${record.time || 'N/A'}]</span>
                    ${record.data || ''}
                </div>`;
            }
            
            dataBox.innerHTML = html;
        }
        
        window.onload = function() {
            const savedGistId = localStorage.getItem('gist_id');
            if (savedGistId) {
                document.getElementById('gistId').value = savedGistId;
            }
        };
    </script>
</body>
</html>
